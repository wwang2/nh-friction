name: Deploy Pages

on:
  push:
    branches: [main]
    paths: ['docs/**', 'research/archive/**', 'research/solutions/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage site
        run: |
          mkdir -p _site
          cp -R docs/. _site/
          # Figures live under research/archive/<name>/figures/ on main.
          # Serve them at the same relative path so docs/data.json entries
          # like "research/archive/foo/figures/loss.png" resolve correctly.
          if [ -d research ]; then
            mkdir -p _site/research
            cp -R research _site/
          fi
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - id: deployment
        uses: actions/deploy-pages@v4
